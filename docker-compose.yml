version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev:api
    environment:
      NODE_ENV: development
      PORT: 3777
      JWT_SECRET: change-me-in-production
    ports:
      - '3777:3777'

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://api:3777
    ports:
      - '5173:5173'
    depends_on:
      - api
