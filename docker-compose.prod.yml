version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - link_saver_data:/app/server/data
    restart: unless-stopped
    networks:
      - link_saver

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - '8080:8080'
    restart: unless-stopped
    networks:
      - link_saver

volumes:
  link_saver_data:

networks:
  link_saver:
    driver: bridge
